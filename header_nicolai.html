<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nicolai Store — Header</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --orange: #FF7300;
    --orange-hot: #FF4D00;
    --orange-glow: rgba(255,115,0,0.6);
    --dark: #0A0A0A;
    --dark2: #111111;
    --dark3: #181818;
  }

  body {
    background: #0d0d0d;
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
  }

  /* ═══════════════════════════════
     CANVAS PARTÍCULAS
  ═══════════════════════════════ */
  #particle-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* ═══════════════════════════════
     HEADER PRINCIPAL
  ═══════════════════════════════ */
  .site-header {
    position: relative;
    width: 100%;
    background: var(--dark);
    overflow: hidden;
  }

  /* Gradiente diagonal de fondo */
  .header-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,115,0,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 80% at 0% 50%, rgba(255,77,0,0.08) 0%, transparent 60%),
      linear-gradient(160deg, #0e0e0e 0%, #0A0A0A 40%, #0d0808 100%);
    z-index: 0;
  }

  /* Líneas de velocidad (efecto manga) */
  .speed-lines {
    position: absolute;
    inset: 0;
    z-index: 0;
    opacity: 0.04;
    background: repeating-conic-gradient(
      from 0deg at 50% 140%,
      transparent 0deg,
      transparent 1.4deg,
      rgba(255,115,0,1) 1.5deg,
      transparent 1.6deg,
      transparent 3deg
    );
  }

  /* Línea decorativa inferior del header */
  .header-border-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg,
      transparent 0%,
      var(--orange) 20%,
      #FFB347 50%,
      var(--orange) 80%,
      transparent 100%
    );
    z-index: 10;
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; filter: drop-shadow(0 0 8px var(--orange)); }
  }

  /* ═══════════════════════════════
     INNER LAYOUT
  ═══════════════════════════════ */
  .header-inner {
    position: relative;
    z-index: 5;
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 40px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ═══════════════════════════════
     BRAND BLOCK
  ═══════════════════════════════ */
  .brand-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    opacity: 0;
    transform: translateY(-30px);
    animation: dropIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
  }

  @keyframes dropIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Logo */
  .logo-wrap {
    position: relative;
    width: 110px;
    height: 110px;
  }

  .logo-ring {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: conic-gradient(
      var(--orange) 0deg,
      var(--orange-hot) 90deg,
      transparent 160deg,
      transparent 200deg,
      var(--orange-hot) 270deg,
      var(--orange) 360deg
    );
    animation: spin 6s linear infinite;
    opacity: 0.7;
    filter: blur(1px);
  }

  .logo-ring-inner {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: var(--dark);
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .logo-img {
    position: relative;
    z-index: 2;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    filter: drop-shadow(0 0 20px rgba(255,115,0,0.5));
    transition: filter 0.3s;
  }

  .logo-img:hover {
    filter: drop-shadow(0 0 35px rgba(255,115,0,0.9)) brightness(1.1);
  }

  /* Store name */
  .store-name-wrap {
    margin-top: 14px;
    text-align: center;
    line-height: 1;
  }

  .store-name-main {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(52px, 8vw, 88px);
    letter-spacing: 6px;
    color: #fff;
    text-shadow:
      0 0 40px rgba(255,115,0,0.5),
      0 2px 0 rgba(0,0,0,0.8);
    display: block;
  }

  .store-name-main span {
    color: var(--orange);
    text-shadow:
      0 0 30px var(--orange-glow),
      0 0 60px rgba(255,115,0,0.3),
      0 2px 0 rgba(0,0,0,0.8);
  }

  .store-name-jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 8px;
    color: rgba(255,115,0,0.6);
    text-transform: uppercase;
    display: block;
    margin-top: 4px;
  }

  /* ═══════════════════════════════
     BADGES / PILLS
  ═══════════════════════════════ */
  .badges-row {
    display: flex;
    gap: 10px;
    margin-top: 18px;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.55s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .badge {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 16px;
    border-radius: 4px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .badge:hover { transform: translateY(-2px); }

  .badge::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent);
  }

  .badge-orange {
    background: linear-gradient(135deg, rgba(255,115,0,0.15), rgba(255,77,0,0.08));
    border: 1px solid rgba(255,115,0,0.4);
    color: #FF9A40;
  }

  .badge-white {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.75);
  }

  .badge-icon {
    font-size: 14px;
  }

  /* ═══════════════════════════════
     DIVIDER
  ═══════════════════════════════ */
  .divider {
    width: 100%;
    max-width: 600px;
    height: 1px;
    margin: 20px 0 16px;
    background: linear-gradient(90deg,
      transparent,
      rgba(255,115,0,0.3) 30%,
      rgba(255,115,0,0.3) 70%,
      transparent
    );
    opacity: 0;
    animation: fadeUp 0.5s ease 0.7s forwards;
  }

  /* ═══════════════════════════════
     REDES SOCIALES
  ═══════════════════════════════ */
  .social-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.85s forwards;
  }

  .social-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 20px;
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .social-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    transform: scaleX(0);
    transition: transform 0.25s;
  }

  .social-btn:hover {
    transform: translateY(-3px);
    color: #fff;
    border-color: var(--btn-color, var(--orange));
    background: rgba(var(--btn-rgb, 255,115,0), 0.1);
    box-shadow: 0 8px 24px rgba(var(--btn-rgb, 255,115,0), 0.2);
  }

  .social-btn:hover::after {
    transform: scaleX(1);
    background: var(--btn-color, var(--orange));
  }

  .fb-btn  { --btn-color: #1877F2; --btn-rgb: 24,119,242; }
  .ig-btn  { --btn-color: #E1306C; --btn-rgb: 225,48,108; }
  .tk-btn  { --btn-color: #69C9D0; --btn-rgb: 105,201,208; }
  .wa-btn  { --btn-color: #25D366; --btn-rgb: 37,211,102; }

  /* SVG icons inline */
  .social-icon { width: 16px; height: 16px; flex-shrink: 0; }

  /* ═══════════════════════════════
     CORNER DECORATIONS
  ═══════════════════════════════ */
  .corner {
    position: absolute;
    width: 60px; height: 60px;
    z-index: 3;
    opacity: 0.5;
  }
  .corner-tl { top: 0; left: 0;
    border-top: 2px solid var(--orange);
    border-left: 2px solid var(--orange);
  }
  .corner-tr { top: 0; right: 0;
    border-top: 2px solid var(--orange);
    border-right: 2px solid var(--orange);
  }
  .corner-bl { bottom: 3px; left: 0;
    border-bottom: 2px solid var(--orange);
    border-left: 2px solid var(--orange);
  }
  .corner-br { bottom: 3px; right: 0;
    border-bottom: 2px solid var(--orange);
    border-right: 2px solid var(--orange);
  }

  /* ═══════════════════════════════
     SCAN LINE (efecto retro CRT sutil)
  ═══════════════════════════════ */
  .scanline {
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.03) 3px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* ═══════════════════════════════
     DEMO: debajo del header
  ═══════════════════════════════ */
  .demo-body {
    background: #111;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.15);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>

<script>
// ─── PARTÍCULAS ───────────────────────────────────────────────
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

const particles = [];
const COUNT = 55;

function rand(a, b) { return Math.random() * (b - a) + a; }

for (let i = 0; i < COUNT; i++) {
  particles.push({
    x: rand(0, canvas.width),
    y: rand(0, canvas.height),
    r: rand(0.5, 2.2),
    vx: rand(-0.3, 0.3),
    vy: rand(-0.5, -0.15),
    alpha: rand(0.1, 0.6),
    color: Math.random() > 0.5 ? '255,115,0' : '255,200,80',
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.y < -4) { p.y = canvas.height + 4; p.x = rand(0, canvas.width); }
    if (p.x < -4) p.x = canvas.width + 4;
    if (p.x > canvas.width + 4) p.x = -4;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
    ctx.fill();
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();
</script>
